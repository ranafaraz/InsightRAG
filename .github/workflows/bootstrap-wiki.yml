name: Bootstrap Wiki
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/bootstrap-wiki.yml']

permissions:
  contents: write

jobs:
  bootstrap-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIKI_REPO: ${{ github.repository }}.wiki
        run: |
          git config --global user.name "Rana Faraz"
          git config --global user.email "faraz.ahmed@iub.edu.pk"
          mkdir wiki-dir
          cd wiki-dir
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${WIKI_REPO}.git"
          printf '# InsightRAG\n\nProduction-grade agentic RAG: hybrid retrieval, cross-encoder reranking, grounded answers with citations, offline-first.\n\n## Wiki pages\n- [Architecture](Architecture)\n- [Evaluation](Evaluation)\n- [Configuration](Configuration)\n- [Development](Development)\n' > Home.md
          git add .
          git commit -m "Initialize wiki"
          git push origin HEAD:master --force
